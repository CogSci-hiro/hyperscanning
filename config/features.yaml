features:
  continuous:
    sfreq_hz: 64.0
  envelope:
    frame_length_seconds: 0.025
    frame_step_seconds: 0.010
    smoothing_frames: 7
    peak_threshold: 0.1
  pitch:
    fmin_hz: 75.0
    fmax_hz: 500.0
    frame_length_seconds: 0.040
    frame_step_seconds: 0.010
    fill_strategy: "zero"
  formants:
    frame_length_seconds: 0.025
    frame_step_seconds: 0.010
    lpc_order: 10
    max_formant_hz: 5500.0
    min_interval_duration_seconds: 0.030
    use_parselmouth: true
    language: null
    resource_root: null
  stanza_pos:
    enabled: true
    language: "fr"
    processors: "tokenize,pos,lemma"
    resources_dir: null
    allow_download: true
    preserve_unmapped_rows: true
    fail_on_mapping_error: false
