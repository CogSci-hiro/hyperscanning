# General configuration ################################################################################################
project:
  name: "hyperscanning"

debug:
  enabled: false
  subjects: ["sub-006"]

subjects:
  pattern: "sub-*"
  exclude: [
             "sub-001",  # only 32-electrodes
             "sub-002",  # only 32-electrodes
             "sub-003",  # bad electrode placement
             # "sub-004",  # to match partners
             # "sub-031",  # to match partners
             "sub-032",   # bad signal
  ]
  missing_runs:
    sub-004:
      conversation: [ "1", "2" ]

tasks:
  include: ["conversation"]#, "resting"]

runs:
  include:
    conversation: [1,2,3,4,5,6,7,8]
    resting: [1,2]

eeg:
  sfreq_hz: 2048

annotations:
  "ipu": "ipu_v1"


# Parameters for behavioural definitions ###############################################################################

# Define 'adjacent' IPUs (seconds)
min_latency: -1.0
max_latency: 1.0
min_response_duration: 0.01

# Epoching
epochs:
  tmin_s: -2.2  # plus left margin
  tmax_s: 0.5   # plus right margin
  baseline_start_s: -2.2
  baseline_end_s: 0.5
  baseline_s: [-2.2, 0.5]
  detrend: 1
  margin_s: [0.2, 0.5]  # left and right margin for cropping


# TRF benchmark / QC ################################################################################
trf:
  enabled: true
  predictors:
    - self_speech_envelope
    - other_speech_envelope
  qc_predictors:
    - self_speech_envelope
    - other_speech_envelope
  ablation_targets:
    - self_speech_envelope
    - other_speech_envelope
  target_sfreq: 64.0
  lags:
    tmin_seconds: -0.20
    tmax_seconds: 0.60
  conversation:
    duration_seconds: 240.0
    start_source: metadata
  segmentation:
    method: blockwise_within_run
    n_blocks_per_run: 4
    drop_remainder: false
    min_block_duration_seconds: 10.0
  cv:
    outer:
      splitter: group_kfold
      n_splits: 5
      group_by: run_id
    inner:
      splitter: group_kfold
      n_splits: 4
      group_by: segment_id
  hyperparameters:
    alpha:
      scale: logspace
      start_exp: -1
      stop_exp: 8
      num: 10
  model:
    estimator: ridge
    fit_intercept: false
    standardize_x: true
    standardize_y: false
  scoring:
    primary: pearsonr
  random_seed: 42
  outputs:
    save_fold_scores: true
    save_selected_alpha_per_fold: true
    save_coefficients: true
    save_design_info: true
