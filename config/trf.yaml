trf:
  enabled: true
  predictors:
    - self_speech_envelope
    - other_speech_envelope
    #- self_f0
    #- other_f0
    #- self_f1_f2
    #- other_f1_f2
    #- self_phoneme_onsets
    #- other_phoneme_onsets
    #- self_syllable_onsets
    #- other_syllable_onsets
    - self_token_onsets
    - other_token_onsets
    - self_surprisal
    - other_surprisal
    #- self_entropy
    #- other_entropy
  qc_predictors:
    - self_speech_envelope
    - other_speech_envelope
  ablation_targets:
    - self_speech_envelope
    - other_speech_envelope
    - self_token_onsets
    - other_token_onsets
    - self_surprisal
    - other_surprisal
  target_sfreq: 64.0
  lags:
    tmin_seconds: -0.20
    tmax_seconds: 1.0
  conversation:
    duration_seconds: 240.0
    start_source: metadata
  segmentation:
    method: blockwise_within_run
    n_blocks_per_run: 4
    drop_remainder: false
    min_block_duration_seconds: 10.0
  cv:
    outer:
      splitter: group_kfold
      n_splits: 5
      group_by: run_id
    inner:
      splitter: group_kfold
      n_splits: 4
      group_by: segment_id
  hyperparameters:
    alpha:
      scale: logspace
      start_exp: -1
      stop_exp: 8
      num: 10
  model:
    estimator: ridge
    fit_intercept: false
    standardize_x: true
    standardize_y: true
  scoring:
    primary: pearsonr
  random_seed: 42
  outputs:
    save_fold_scores: true
    save_selected_alpha_per_fold: true
    save_coefficients: true
    save_design_info: true
